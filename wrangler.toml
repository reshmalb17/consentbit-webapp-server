name = "consent-webapp-manager"
main = "src/index.js"
compatibility_date = "2026-02-02"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"

[[d1_databases]]
binding = "CONSENT_WEBAPP"
database_name = "consent-webapp"
database_id = "bc37fa30-5060-491d-b19c-f3eeb7b1fd00"

[vars]
JWT_SECRET="x7K9pL2mQ5vR8tY1nB4jH7uF0zA3eD6cK9pL2mQ5vR8tY1nB4jH7uF0zA3eD6cK9p"

# Public Worker URL for stored embed `<script src>` (no trailing slash). Prefer setting **CDN_BASE_URL**
# in Cloudflare → Workers → your worker → Settings → Variables (so production isn’t tied to this file).
# If unset here and not in the dashboard, the Worker uses `request.url.origin` (OK when the API is called on the worker hostname).
CDN_BASE_URL = ""
# Public origin of your Next.js app (no trailing slash). If set, embed tries https://<WEBAPP>/asset/logo.webp first; on failure it loads /embed/floating-logo.svg from this Worker. If empty, the Worker SVG is used directly.
WEBAPP_PUBLIC_URL = ""
# --- Tier plans (Basic / Essential / Growth) — one Stripe *subscription* per checkout, one recurring price per line item ---
# In Stripe Dashboard: create **3 products** (one per tier). Each product has **2 recurring prices** (month + year).
# Map those six price_ ids here. Checkout uses exactly one price → one subscription for the chosen plan + billing interval.
# Tier Basic/Essential/Growth: must be **Recurring** Stripe prices (subscription), not one-time — or Checkout returns "recurring price" errors.
# If only Basic fails: open the Basic product in Stripe → each price must say "Recurring" / subscription. One-time prices will not work.
STRIPE_PRICE_BASIC_MONTHLY = "price_1T7doaJwcuG9163M3fNkG77K" 
STRIPE_PRICE_BASIC_YEARLY = "price_1T7dqFJwcuG9163MlGnV7DRn"
STRIPE_PRICE_ESSENTIAL_MONTHLY = "price_1T7drWJwcuG9163MSZepvR2S"
STRIPE_PRICE_ESSENTIAL_YEARLY = "price_1T7drnJwcuG9163MQ03txwwC"
STRIPE_PRICE_GROWTH_MONTHLY = "price_1T7dsaJwcuG9163MIcICCuWk"
STRIPE_PRICE_GROWTH_YEARLY = "price_1T7dt2JwcuG9163M9xaqMCk6"


# Single plan: recurring subscription prices (promo applies to initial; renewals use these)
STRIPE_PRICE_MONTHLY = "price_1RMxWNJwcuG9163MoH33aEjh"
STRIPE_PRODUCT_MONTHLY = "prod_SHWZdF20XLXtn9"
STRIPE_PRICE_YEARLY = "price_1Sz1ehJwcuG9163Mt7yNlrD6"
STRIPE_PRODUCT_YEARLY = "prod_TwvVRX1MaDL7wV"

# Metered usage (Workflow A cron): set these to your Stripe metered price IDs so we report pageview/scan usage.
# STRIPE_PRICE_ESSENTIAL_PAGEVIEWS_METERED = "price_xxx"
# STRIPE_PRICE_ESSENTIAL_SCANS_METERED = "price_xxx"
# STRIPE_PRICE_GROWTH_PAGEVIEWS_METERED = "price_xxx"
# STRIPE_PRICE_GROWTH_SCANS_METERED = "price_xxx"

# Bulk purchase (not used — create-checkout-session rejects bulk/quantity; per-site tier / legacy single only).
# STRIPE_ONE_TIME_PRICE_MONTHLY = "price_1SpSusJwcuG9163MHGK38FfW"
# STRIPE_ONE_TIME_PRICE_YEARLY = "price_1SpSw0JwcuG9163MLkRgIPmD"
# STRIPE_ONE_TIME_PRODUCT_MONTHLY = "prod_Tn30iMTLmnS6Yz"
# STRIPE_ONE_TIME_PRODUCT_YEARLY = "prod_Tn329EHlZLyLtR"

# Cloudflare Browser Rendering — headless Chrome for full cookie scanning
[browser]
binding = "BROWSER"

# Cron trigger to execute scheduled scans every minute
[triggers]
crons = ["*/1 * * * *"]



